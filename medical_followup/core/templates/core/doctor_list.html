<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>医生列表</title>
</head>
<body>
    <h1>医生列表</h1>
    <a href="/admin/core/doctor/add/">添加医生</a>
    <table border="1">
        <tr>
            <th>姓名</th>
            <th>性别</th>
            <th>电话</th>
            <th>科室</th>
            <th>职称</th>
            <th>操作</th>
        </tr>
        {% for doctor in doctors %}
        <tr>
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.gender }}</td>
            <td>{{ doctor.phone }}</td>
            <td>{{ doctor.department }}</td>
            <td>{{ doctor.title }}</td>
            <td>
                <a href="/admin/core/doctor/{{ doctor.id }}/change/">编辑</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'index' %}">返回首页</a>
</body>
</html>
