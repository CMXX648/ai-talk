<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>患者列表</title>
</head>
<body>
    <h1>患者列表</h1>
    <a href="/admin/core/patient/add/">添加患者</a>
    <table border="1">
        <tr>
            <th>姓名</th>
            <th>性别</th>
            <th>年龄</th>
            <th>电话</th>
            <th>操作</th>
        </tr>
        {% for patient in patients %}
        <tr>
            <td>{{ patient.name }}</td>
            <td>{{ patient.gender }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.phone }}</td>
            <td>
                <a href="{% url 'patient_detail' patient.id %}">详情</a> |
                <a href="/admin/core/patient/{{ patient.id }}/change/">编辑</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'index' %}">返回首页</a>
</body>
</html>
